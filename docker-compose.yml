services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app
    env_file:
      - .env
    environment:
      DB_DRIVER: ${DB_DRIVER:-pgsql}
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-lastmin}
      DB_USER: ${DB_USER:-lastmin}
      DB_PASSWORD: ${DB_PASSWORD:-lastmin}
      DB_DSN: ${DB_DSN:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-dev-stripe-webhook-secret}
      STRIPE_MODE: ${STRIPE_MODE:-simulation}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
    volumes:
      - ./:/app
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "php bin/migrate.php && php -S 0.0.0.0:8080 -t public public/router.php"

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app
    env_file:
      - .env
    environment:
      DB_DRIVER: ${DB_DRIVER:-pgsql}
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-lastmin}
      DB_USER: ${DB_USER:-lastmin}
      DB_PASSWORD: ${DB_PASSWORD:-lastmin}
      DB_DSN: ${DB_DSN:-}
      STRIPE_MODE: ${STRIPE_MODE:-simulation}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
    volumes:
      - ./:/app
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started
    command: sh -c "while true; do php bin/run-worker.php; sleep 30; done"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    environment:
      API_URL: http://backend:8080
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-lastmin}
      POSTGRES_USER: ${DB_USER:-lastmin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-lastmin}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-lastmin} -d ${DB_NAME:-lastmin}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
