services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app
    env_file:
      - .env
    environment:
      DB_DRIVER: ${DB_DRIVER:-pgsql}
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-lastmin}
      DB_USER: ${DB_USER:-lastmin}
      DB_PASSWORD: ${DB_PASSWORD:-lastmin}
      DB_DSN: ${DB_DSN:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-dev-stripe-webhook-secret}
    volumes:
      - ./:/app
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "php bin/migrate.php && php -S 0.0.0.0:8080 -t public"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-lastmin}
      POSTGRES_USER: ${DB_USER:-lastmin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-lastmin}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-lastmin} -d ${DB_NAME:-lastmin}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # TODO(next prompt): enable FE container wiring once frontend Docker image/service is finalized.
  # frontend:
  #   build:
  #     context: ../frontend
  #     dockerfile: Dockerfile
  #   ports:
  #     - "3000:3000"
  #   depends_on:
  #     - backend

volumes:
  postgres_data:
